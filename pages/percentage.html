<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Percentage</title>
	
	<link href="data:;base64,iVBORw0KGgo=" rel="icon">
	<link href="../assets/html.css" rel="stylesheet">
	<link href="../assets/por.min.css" rel="stylesheet">
	<link href="../assets/table.css" rel="stylesheet">
	<script src="../assets/por.min.js"></script>

	<style>
		body, input {
			font-family: Arial;
			font-size: 22px;
		}

		.input-row {
			display: flex;
			padding: 20px 40px;
			box-sizing: border-box;
		}
		.input-row>* {
			flex: 1;
			padding: 10px;
			box-sizing: border-box;
		}
		label input {
			width: 100%;
			box-sizing: border-box;
		}
		.output-row {
			text-align: center;
		}
		span[id] {
			color: red;
		}
	</style>

</head>
<body>
	<h1>Percentage Calculator</h1>
	
	<div class="input-row">
		<label>Initial value: <input id="in0_val_in" type="number" value="200"></label>
		<label>% change: <input id="in0_pct_chng_in" type="number" value="20"></label>
		<label>Final value: <input id="in0_final_in" type="number"></label>
	</div>
	<div class="output-row" id="out0_div">
		<span id="out0_val"></span>
		<span>changed by</span>
		<span id="out0_net_chng"></span>
		(<span id="out0_pct_chng"></span>%)
		<span>gives</span>
		<span id="out0_final"></span>
	</div>
	
	<hr>
	
	<div class="input-row">
		<label>Initial value: <input id="in2_val_in" type="number" value="200"></label>
		<label>Final value: <input id="in2_final_in" type="number" value="120"></label>
		<label>% change: <input id="in2_pct_chng_in" type="number"></label>
	</div>
	<div class="output-row" id="out2_div">
		<span id="out2_val"></span>
		<span>is changed to</span>
		<span id="out2_final"></span>
		<span>for</span>
		<span id="out2_net_chng"></span>
		(<span id="out2_pct_chng"></span>%)
	</div>
	
	<hr>
	
	<div class="input-row">
		<label>Percentage: <input id="in1_pct_in" type="number" value="20"></label>
		<label>Total value: <input id="in1_total_in" type="number" value="120"></label>
		<label>Value: <input id="in1_val_in" type="number"></label>
	</div>
	<div class="output-row" id="out1_div">
		<span id="out1_pct"></span>
		<span>percent of</span>
		<span id="out1_total"></span>
		<span>is</span>
		<span id="out1_val"></span>
	</div>
	
	<hr>
	
	<div class="input-row">
		<label>Net change: <input id="in3_diff_in" type="number" value="30"></label>
		<label>% change: <input id="in3_pct_chng_in" type="number" value="40"></label>
		<label>Principal: <input id="in3_val_in" type="number"></label>
	</div>
	<div class="output-row" id="out3_div">
		<span id="out3_chng"></span>
		<span>is</span>
		<span id="out3_pct"></span>
		<span>percent of</span>
		<span id="out3_prin"></span>
	</div>
	
	<script>
		in0_val_in.addEventListener("input", onStartingInput0Change);
		in0_pct_chng_in.addEventListener("input", onStartingInput0Change);
		in0_final_in.addEventListener("input", onEndingInput0Change);
		
		in2_val_in.addEventListener("input", onStartingInput2Change);
		in2_final_in.addEventListener("input", onStartingInput2Change);
		in2_pct_chng_in.addEventListener("input", onEndingInput2Change);
		
		in1_pct_in.addEventListener("input", onStartingInput1Change);
		in1_total_in.addEventListener("input", onStartingInput1Change);
		in1_val_in.addEventListener("input", onEndingInput1Change);
		
		in3_diff_in.addEventListener("input", onStartingInput3Change);
		in3_pct_chng_in.addEventListener("input", onStartingInput3Change);
		in3_val_in.addEventListener("input", onEndingInput3Change);
		
		function calcPercentChange(initVal, finalVal) {
			const diff = finalVal - initVal;
			return {
				diff,
				pctChng: diff * 100 / Math.abs(initVal)
			};
		}
		function round(val) {
			return Math.round(val * 100) / 100;
		}
		function setTexts(elems, ...args) {
			let elemCount = elems.length;
			for(let i = 0; i < elemCount; ++i) {
				let elem = elems[i];
				let val = args[i];
				elem.textContent = (val || val === 0) ? round(val) : 'NaN';
			}
		}
		function onStartingInput0Change() {
			const initVal = Number(in0_val_in.value); 
			const pctChng = Number(in0_pct_chng_in.value);
			const diff = initVal * pctChng / 100
			const finalVal = in0_final_in.value = initVal + diff;
			
			setTexts(
				out0_div.querySelectorAll('span[id]'), 
				initVal, 
				diff, 
				pctChng, 
				finalVal
			);
		}
		function onEndingInput0Change() {
			const initVal = Number(in0_val_in.value); 
			const finalVal = Number(in0_final_in.value);
			const ret = calcPercentChange(initVal, finalVal);
			in0_pct_chng_in.value = ret.pctChng;
			
			setTexts(
				out0_div.querySelectorAll('span[id]'), 
				initVal, 
				ret.diff, 
				ret.pctChng, 
				finalVal
			);
		}
		
		function onStartingInput1Change() {
			const pctChng = Number(in1_pct_in.value);
			const initVal = Number(in1_total_in.value);
			const finalVal = in1_val_in.value = initVal * pctChng / 100;
			
			setTexts(
				out1_div.querySelectorAll('span[id]'), 
				pctChng, 
				initVal, 
				finalVal
			);
		}
		function onEndingInput1Change() {
			const pctChng = Number(in1_pct_in.value);
			const finalVal = Number(in1_val_in.value);
			const initVal = in1_total_in.value = finalVal / pctChng * 100;
			
			setTexts(
				out1_div.querySelectorAll('span[id]'), 
				pctChng, 
				initVal, 
				finalVal
			);
		}
		
		function onStartingInput2Change() {
			const initVal = Number(in2_val_in.value);
			const finalVal = Number(in2_final_in.value);
			const ret = calcPercentChange(initVal, finalVal);
			in2_pct_chng_in.value = ret.pctChng;
			
			setTexts(
				out2_div.querySelectorAll('span[id]'), 
				initVal, 
				finalVal, 
				ret.diff, 
				ret.pctChng
			);
		}
		function onEndingInput2Change() {
			const initVal = Number(in2_val_in.value);
			const pctChng = Number(in2_pct_chng_in.value);
			const finalVal = in1_val_in.value = initVal * pctChng / 100;
			const diff = finalVal - initVal;
			
			setTexts(
				out2_div.querySelectorAll('span[id]'), 
				initVal, 
				finalVal,
				diff,
				pctChng
			);
		}
		
		function onStartingInput3Change() {
			const diff = Number(in3_diff_in.value);
			const pctChng = Number(in3_pct_chng_in.value);
			const initVal = in3_val_in.value = diff * 100 / pctChng;
			
			setTexts(
				out3_div.querySelectorAll('span[id]'), 
				diff, 
				pctChng, 
				initVal
			);
		}
		function onEndingInput3Change() {
			const diff = Number(in3_diff_in.value);
			const initVal = Number(in3_val_in.value);
			const pctChng = in3_pct_chng_in.value = diff * 100 / initVal;
			
			setTexts(
				out3_div.querySelectorAll('span[id]'), 
				diff, 
				pctChng, 
				initVal
			);
		}
		
		onStartingInput0Change();
		onStartingInput1Change();
		onStartingInput2Change();
		onStartingInput3Change();
	</script>

</body>
</html>
